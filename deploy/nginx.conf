# /etc/nginx/sites-available/mobile_car_wash
# Driveway Detail Co — Nginx reverse proxy with SSL

upstream phoenix {
    server 127.0.0.1:4000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name drivewaydetailcosa.com www.drivewaydetailcosa.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name drivewaydetailcosa.com www.drivewaydetailcosa.com;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/drivewaydetailcosa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drivewaydetailcosa.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Proxy to Phoenix
    location / {
        proxy_pass http://phoenix;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (LiveView)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-polling / WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Static assets — serve directly from Nginx
    location /assets/ {
        alias /opt/mobile_car_wash/current/lib/mobile_car_wash-0.1.0/priv/static/assets/;
        expires max;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    location /images/ {
        alias /opt/mobile_car_wash/current/lib/mobile_car_wash-0.1.0/priv/static/images/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Stripe webhooks — increase body size for large payloads
    location /webhooks/stripe {
        proxy_pass http://phoenix;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
    }

    # Max upload size for photo uploads
    client_max_body_size 50m;
}
